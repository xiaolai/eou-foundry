id: specify-eou
name: Specify EOU
version: 0.2.0
classification:
  function: generate
  target_object: foundry governance object
  automation_mode: LLM_assisted
  authority_level: write_candidate
  risk_level: medium
  lifecycle_stage: draft
purpose:
  statement: Turn an approved candidate into a formal EOU spec using canonical schema.
  non_goals:
  - Do not bypass ECP or human approval.
operating_hypothesis: Given valid Foundry context, Specify EOU can perform its bounded
  role without exceeding its authority.
inputs:
  required:
  - foundry/constitution.yml
  - foundry/registry.yml
  optional: []
  forbidden_assumptions:
  - Do not assume missing context exists.
context_manifest:
  source_of_truth:
  - constitution.yml
  - registry.yml
  - failure-taxonomy.yml
  supporting: []
  forbidden: []
execution:
  steps:
  - Load source-of-truth files.
  - Validate required inputs.
  - Perform bounded operation.
  - Write candidate/report only.
  - Record trace.
  decision_points: []
  stop_conditions:
  - Missing owner.
  - Authority boundary unclear.
  - Would mutate active file without approved ECP.
  allowed_tools: []
  prohibited_actions: []
outputs:
  primary:
  - specify-eou output
  secondary: []
  trace:
  - runs/{run_id}/trace.yml
success_criteria:
  must_pass:
  - Does not exceed authority level.
  - Uses failure taxonomy when diagnosing or justifying changes.
  should_pass: []
validation:
  deterministic:
  - schema checks
  judgment:
  - independent audit required before activation/promotion
  red_team: []
failure_modes:
  known:
  - Over-broad proposal
  - Self-approval risk
  - Weak operational value
  - No rollback path
  warning_signs: []
  repair_actions: []
escalation:
  require_human_when: []
  require_approval_for: []
responsibility:
  executor: Claude / script / human depending on run mode
  reviewer: human owner or designated auditor
  approver: human owner
  cannot_delegate:
  - final approval
  - weakening validation
  - publication or high-stakes decisions
versioning:
  supersedes: []
  changelog:
  - '0.2.0: converted to faceted EOU Foundry V2 schema.'
blast_radius:
  allowed_scope:
  - foundry/self-evolution/
  - foundry/audits/
  - foundry/incidents/
  forbidden_scope:
  - foundry/constitution.yml
  - approved ECPs
  - production schemas unless ECP-approved
generation_envelope:
  allowed_outputs:
  - candidate_regression_case
  - candidate_refactor_option
  - candidate_ecp
  - candidate_eou_spec
  forbidden_outputs:
  - active_eou
  - approved_eou
  - constitution_change
  - validator_weakening_without_ecp
  max_candidates: 5
  default_status: candidate
  required_for_each_candidate:
  - operational_value
  - risk
  - authority_level
  - activation_requirements
  - arguments_against
generation_budget:
  max_candidates: 5
  max_new_schemas: 1
  max_new_validators: 2
  max_open_questions: 8
  must_rank_candidates: true
  must_select_minimal_set: true
registry_diff:
  required: true
  questions:
  - Does this duplicate an existing object?
  - Can this be a test or rule instead?
minimality_test:
  questions:
  - Can this be smaller?
  - Can this be a validator?
  - Can this be a regression case?
  - Can this be a field in an existing object?
operational_value_test:
  required_answer:
  - prevents_failure
  - improves_decision
  - exposes_hidden_judgment
  - improves_traceability
  reject_if:
  - no concrete failure
  - no improved decision
  - duplicates existing object
counter_generation:
  required: true
  requires_for_each_candidate:
  - arguments_against
  - minimality_result
