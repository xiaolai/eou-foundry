schema_id: eou.schema.v2
description: Canonical EOU spec schema using multi-dimensional classification, authority
  limits, and traceable governance.
required_top_level:
- id
- name
- version
- classification
- purpose
- operating_hypothesis
- inputs
- context_manifest
- execution
- outputs
- success_criteria
- validation
- failure_modes
- escalation
- responsibility
- blast_radius
- versioning
classification:
  required:
  - function
  - target_object
  - automation_mode
  - authority_level
  - risk_level
  - lifecycle_stage
  valid_function:
  - generate
  - specify
  - validate
  - diagnose
  - promote
  - refactor
  - audit
  - propose
  valid_automation_mode:
  - deterministic
  - LLM_assisted
  - human_executed
  - hybrid
  valid_authority_level:
  - suggest_only
  - draft_only
  - write_candidate
  - write_inactive
  - mutate_active
  - approve
  - publish
  valid_risk_level:
  - low
  - medium
  - high
  - critical
  valid_lifecycle_stage:
  - candidate
  - draft
  - simulated
  - pilot
  - active
  - monitored
  - stable
  - deprecated
  - retired
nested_required:
  classification:
  - function
  - target_object
  - automation_mode
  - authority_level
  - risk_level
  - lifecycle_stage
  purpose:
  - statement
  - non_goals
  inputs:
  - required
  - optional
  - forbidden_assumptions
  context_manifest:
  - source_of_truth
  - supporting
  - forbidden
  execution:
  - steps
  - decision_points
  - stop_conditions
  - allowed_tools
  - prohibited_actions
  outputs:
  - primary
  - secondary
  - trace
  success_criteria:
  - must_pass
  - should_pass
  validation:
  - deterministic
  - judgment
  - red_team
  failure_modes:
  - known
  - warning_signs
  - repair_actions
  escalation:
  - require_human_when
  - require_approval_for
  responsibility:
  - executor
  - reviewer
  - approver
  - cannot_delegate
  versioning:
  - supersedes
  - changelog
generating_eou_required:
- generation_envelope
- generation_budget
- registry_diff
- minimality_test
- operational_value_test
- counter_generation
generating_eou_candidate_required:
- lifecycle_stage
- distinct_success_criterion
- classification.authority_level
- classification.risk_level
- owner_required
- activation_requirements
- operational_value
- arguments_against
- minimality_result
invariants:
- Generated operating units default to candidate status.
- Generating EOUs may not activate, approve, publish, or weaken validators.
- Each EOU must declare owner/reviewer/approver and non-delegable decisions.
- High-risk and critical units require human approval.
