schema_id: eou.schema.v2
description: Canonical EOU spec schema using multi-dimensional classification, authority
  limits, and traceable governance.
required_top_level:
- id
- name
- version
- classification
- purpose
- operating_hypothesis
- inputs
- context_manifest
- execution
- outputs
- success_criteria
- validation
- failure_modes
- escalation
- responsibility
- blast_radius
- versioning
classification:
  required:
  - function
  - target_object
  - automation_mode
  - authority_level
  - risk_level
  - lifecycle_stage
  optional:
  - judgment_authorized  # ECP-0018 (0.8.0-pending): boolean, default false. When true,
                         # EOU may invoke its app's domain_values at runtime to resolve
                         # contested cases. Forbidden on function:generate per D6.1.
                         # At risk_level high|critical requires per-EOU ECP; at low|medium
                         # may be blanket-authorized per app via
                         # engine/governance.yml rule_98_judgment_blanket_authorization.
  valid_function:
  - generate
  - specify
  - validate
  - diagnose
  - promote
  - refactor
  - audit
  - propose
  - activate
  - implement
  - retire
  valid_automation_mode:
  - deterministic
  - LLM_assisted
  - human_executed
  - hybrid
  valid_authority_level:
  - suggest_only
  - draft_only
  - write_candidate
  - write_inactive
  - mutate_active
  - approve
  - publish
  valid_risk_level:
  - low
  - medium
  - high
  - critical
  valid_lifecycle_stage:
  - candidate
  - draft
  - simulated
  - pilot
  - active
  - monitored
  - stable
  - deprecated
  - retired
nested_required:
  classification:
  - function
  - target_object
  - automation_mode
  - authority_level
  - risk_level
  - lifecycle_stage
  purpose:
  - statement
  - non_goals
  inputs:
  - required
  - optional
  - forbidden_assumptions
  context_manifest:
  - source_of_truth
  - supporting
  - forbidden
  execution:
  - steps
  - decision_points
  - stop_conditions
  - allowed_tools
  - prohibited_actions
  outputs:
  - primary
  - secondary
  - trace
  success_criteria:
  - must_pass
  - should_pass
  validation:
  - deterministic
  - judgment
  - red_team
  failure_modes:
  - known
  - warning_signs
  - repair_actions
  escalation:
  - require_human_when
  - require_approval_for
  responsibility:
  - executor
  - reviewer
  - approver
  - cannot_delegate
  versioning:
  - supersedes
  - changelog
generating_eou_required:
- generation_envelope
- generation_budget
- registry_diff
- minimality_test
- operational_value_test
- counter_generation
generating_eou_candidate_required:
- lifecycle_stage
- distinct_success_criterion
- classification.authority_level
- classification.risk_level
- owner_required
- activation_requirements
- operational_value
- arguments_against
- minimality_result
invariants:
- Generated operating units default to candidate status.
- Generating EOUs may not activate, approve, publish, or weaken validators.
- Each EOU must declare owner/reviewer/approver and non-delegable decisions.
- High-risk and critical units require human approval.
- judgment_authorized is forbidden on function:generate (generators may not create authority; ECP-0018 / D6.1).
- judgment_authorized:true requires the app to have an approved captured_workflow with ≥3 domain_values (ECP-0018).
- judgment_authorized:true at risk_level high or critical requires per-EOU ECP approval (ECP-0018).
