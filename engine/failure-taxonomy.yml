failure_taxonomy:
  F1_INPUT_FAILURE:
    definition: Required input is missing, malformed, stale, or ambiguous.
    repair: Tighten input schema or repair input.
  F2_CONTEXT_FAILURE:
    definition: Wrong context loaded or source of truth omitted.
    repair: Repair context manifest.
  F3_SCHEMA_FAILURE:
    definition: Spec, input, output, or validator schemas diverge.
    repair: Canonicalize schema and update validators.
  F4_SCOPE_FAILURE:
    definition: EOU is too broad, too narrow, or mixes incompatible tasks.
    repair: Split, merge, or redefine EOU.
  F5_INSTRUCTION_FAILURE:
    definition: Steps are unclear, contradictory, or non-executable.
    repair: Rewrite execution procedure.
  F6_JUDGMENT_FAILURE:
    definition: EOU fails to reliably distinguish acceptable from unacceptable output.
      This covers two distinct subtypes that require different repairs.
    subtypes:
      F6a_STRUCTURAL:
        definition: The EOU conflates two or more distinct judgments that have different success criteria or different responsible parties. The EOU is architecturally wrong, not just missing tests.
        repair: Responsibility-separation or split refactor. Assign each judgment to a distinct EOU or human gate.
      F6b_COVERAGE:
        definition: The EOU has the right judgment but no validation criteria to confirm it. The architecture is correct but the boundary is unverifiable.
        repair: Add judgment predicates, explicit success criteria, or a human review gate. Add regression cases covering the known good/bad boundary.
  F7_VALIDATION_FAILURE:
    definition: Validator passes invalid output or rejects valid output.
    repair: Improve validation logic and add regression case covering the boundary.
  F8_TOOL_FAILURE:
    definition: Script, model, API, plugin, or external tool fails hard (error, timeout,
      or unavailable).
    repair: Isolate dependency, add fallback, or add stop condition when the tool is
      unavailable.
  F9_TRACE_FAILURE:
    definition: Run cannot be reconstructed; trace is missing, incomplete, or contradicts
      the declared execution steps.
    repair: Improve trace capture; ensure every step writes to foundry/runs/{eou_id}/{run_id}.yml.
  F10_RESPONSIBILITY_FAILURE:
    definition: No clear owner, approval gate, or escalation path; or the same party
      both executes and approves.
    repair: Add responsibility mapping; separate executor and approver; define escalation
      conditions.
  F11_LIFECYCLE_FAILURE:
    definition: EOU is judged by the wrong maturity standard (e.g., a candidate EOU
      held to active-EOU validation requirements, or an active EOU with no regression suite).
    repair: Declare lifecycle stage explicitly and apply the matching validation level
      from maturity-model.yml.
  F12_DRIFT_FAILURE:
    definition: Specs, scripts, docs, and validators have diverged; a change in one
      layer was not propagated to the others.
    repair: Identify the canonical layer (schemas/), reconcile all dependent layers
      against it, and add a vocabulary-sync check to CI or the audit procedure.
  F13_PERFORMANCE_FAILURE:
    definition: EOU executes correctly but degrades at scale — too slow, too expensive,
      or too unreliable to sustain its operational value under production load.
    repair: Profile and bound the bottleneck. Repair paths in order of blast radius —
      add budget constraints to generation_budget; add a stop condition on cost or
      latency; tier-down automation_mode from LLM_assisted to deterministic for the
      expensive step; split the EOU to isolate the scaling problem; or promote the
      check to a faster tool.
  # ECP-0019 (0.8.0-pending): agentic-judgment failure codes (F14-F17).
  F14_SILENT_JUDGMENT_FAILURE:
    definition: EOU made a contested choice without invoking any value from the
      captured_workflow's domain_values block. The choice may have been correct,
      but it is unaccountable — no trace records what reasoning resolved the conflict.
      Looks like rule-following; is actually opaque agentic judgment. The most
      dangerous agentic-judgment failure mode per V1 (Epistemic Integrity).
    repair: Require value_invocations[] entry for every contested case detected in the
      run. Update the EOU's execution to surface contested cases explicitly and require
      invocation or escalation. Add a regression case for the specific contested pattern.
  F15_VALUE_HIERARCHY_FAILURE:
    definition: EOU invoked a lower-priority domain_value over a higher-priority one for
      the same contested case. The priority order in the captured_workflow was violated
      by the invocation.
    repair: Examine the rule_conflict in the value_invocations entry; determine whether
      the priority order needs revision (ECP amending the captured_workflow) or the
      invocation was wrong (regression case for the EOU). Most often the latter.
  F16_VALUE_DRIFT_FAILURE:
    definition: EOU's invocation pattern over multiple runs has diverged from the
      captured_workflow's declared priority order — without any captured_workflow
      amendment ECP. The system is silently rewriting its own constitution by
      precedent.
    repair: Triage the drift — either reset the EOU's invocation behavior (regression
      suite), or formalize the drift as a captured_workflow amendment (ECP). Never let
      drift continue undocumented per D5.5 (constitution).
  F17_VALUE_HALLUCINATION_FAILURE:
    definition: EOU invoked a value not declared in the captured_workflow's domain_values
      block. The invocation cites a domain_value_id that does not resolve.
    repair: Validate domain_value_id against the captured_workflow at invocation time;
      reject invocations with unknown ids. Add a regression case for the specific
      hallucinated id pattern. Investigate whether the EOU's prompt or training data
      introduced the fabricated value.
diagnosis_outcome:
  # Not every diagnosed failure becomes an ECP. Record the decision explicitly.
  change:   An ECP was opened. See foundry/self-evolution/ecp/proposed/.
  no_change: Decision made to accept the current behavior. Record in
    foundry/audits/incidents/{incident_id}.no-change.yml (see governance.yml decision_records).
