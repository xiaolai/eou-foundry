id: audit-eou
name: Audit EOU
version: 0.3.0
classification:
  function: audit
  target_object: foundry governance object
  automation_mode: LLM_assisted
  authority_level: write_inactive
  risk_level: medium
  lifecycle_stage: draft
purpose:
  statement: Audit an EOU spec for schema completeness, authority correctness, validation strength, failure mode coverage, and governance fit.
  non_goals:
  - Do not bypass ECP or human approval.
  - Do not rewrite the audited EOU — produce findings only.
  - Do not advance the EOU's lifecycle_stage; that requires eou-promote.
operating_hypothesis: Given an EOU spec and the Foundry governance files, this EOU can identify structural deficiencies that prevent safe promotion.
inputs:
  required:
  - target_eou_spec  # path to the EOU spec file being audited
  - foundry/constitution.yml
  - foundry/failure-taxonomy.yml
  - foundry/registry.yml
  optional:
  - foundry/self-evolution/regression/cases/  # to check regression coverage
  - runs/*/trace.yml                           # to check execution evidence
  - foundry/captured-workflows/cw-{app_id}.yml # ECP-0017 / Rule 96: when present and approved, run Value Operationalization Test
  forbidden_assumptions:
  - Do not assume the EOU's steps are correct because they are present.
  - Do not assume classification facets are correct because they are populated.
context_manifest:
  source_of_truth:
  - constitution.yml
  - registry.yml
  - failure-taxonomy.yml
  supporting:
  - schemas/eou.schema.yml
  forbidden:
  - foundry/constitution.yml  # read-only in this context
execution:
  steps:
  - Load foundry/constitution.yml, foundry/failure-taxonomy.yml, foundry/registry.yml, and schemas/eou.schema.yml.
  - Load the target EOU spec.
  - Check schema completeness — every required field must be present and non-placeholder.
  - Check classification authority_level against blast_radius.allowed_scope — flag mismatches (write_candidate scoped to active files, etc.).
  - Check execution.steps — reject generic "Perform bounded operation" entries; each step must name a specific, bounded action.
  - Check stop_conditions is non-empty; check warning_signs and repair_actions are both non-empty.
  - Check escalation.require_human_when against risk_level — high or critical risk must have at least one human gate.
  - Check self-approval risk — responsibility.executor must not equal responsibility.approver.
  - Check registry.yml for lifecycle_stage consistency with the spec.
  - Check regression coverage — at least one fixture in foundry/self-evolution/regression/cases/ for each pilot or active EOU.
  - "ECP-0017 / Rule 96 — IF the audited EOU is in an app whose foundry/captured-workflows/ contains an approved captured_workflow AND target_object is not in engine/governance.yml rule_96_exempt_target_objects, run the Value Operationalization Test. Verify that success_criteria.must_pass contains at least one entry whose text references at least one domain_value id of priority ≤ 3. Severity of violation — blocking at lifecycle_stage active or higher; high at pilot; medium at draft or candidate. Record the operationalized domain_value ids in the audit report so future audits can detect drift."
  - Write audit findings.
  decision_points:
  - If zero findings after all checks, force-add a "vacuous audit" finding — no nontrivial EOU has zero structural gaps.
  - If lifecycle_stage is candidate or draft, PASS verdict requires only schema completeness; full operational readiness checks apply to pilot and above.
  stop_conditions:
  - Missing owner.
  - Authority boundary unclear.
  - Would mutate active file without approved ECP.
  - Target EOU spec file not found.
  allowed_tools:
  - Read
  - Grep
  - Write
  prohibited_actions:
  - Modifying the target EOU spec
  - Setting approval_status to approved
  - Advancing lifecycle_stage
outputs:
  primary:
  - foundry/audits/eou-audits/{eou_id}.audit.yml
  secondary: []
  trace:
  - foundry/runs/{eou_id}/{run_id}.yml
success_criteria:
  must_pass:
  - Audit identifies at least one finding (even a strength) — zero findings is suspicious.
  - Does not set lifecycle_stage or approval_status on the audited EOU.
  - Authority-level check is included in all audits.
  should_pass:
  - Regression coverage checked for pilot and active EOUs.
  - Escalation gates checked for high-risk EOUs.
validation:
  deterministic:
  - Schema field presence check (machine-verifiable against schemas/eou.schema.yml)
  - executor != approver check
  - stop_conditions non-empty check
  judgment:
  - Step specificity assessment
  - Operational value quality
  red_team:
  - Audit that passes a clearly broken EOU
failure_modes:
  known:
  - Audits individual fields but misses structural weakness in composition
  - Produces zero findings on an underspecified EOU
  - Declares PASS for a candidate-stage EOU without sufficient evidence
  warning_signs:
  - Audit produces zero findings for any EOU with more than 5 execution steps.
  - Audit verdict is PASS and the EOU lifecycle_stage is candidate or draft.
  - Authority-level mismatch finding is absent despite blast_radius containing active governance paths.
  repair_actions:
  - Re-run with explicit authority-level check; force at least one finding to be recorded.
  - Downgrade PASS to CONDITIONAL_PASS for candidate/draft-stage EOUs.
  - Add authority-level mismatch finding manually if blast_radius contains constitution.yml or registry.yml.
escalation:
  require_human_when:
  - Audit finds authority_level set to approve or publish on a non-governance EOU.
  - Audit finds self-approval risk (executor == approver).
  - Audit target is a meta-EOU that generates other EOUs.
  require_approval_for:
  - Advancing any EOU from pilot to active based on audit results.
responsibility:
  executor: Claude
  reviewer: human owner or designated Foundry maintainer
  approver: human owner
  cannot_delegate:
  - Final verdict on activation readiness
  - Approving constitutional invariant changes
versioning:
  supersedes: []
  changelog:
  - '0.3.0: Added concrete steps, decision_points, escalation gates, and should_pass criteria. Replaced placeholder output path with concrete path.'
  - '0.2.0: Converted to faceted EOU Foundry V2 schema.'
blast_radius:
  allowed_scope:
  - foundry/audits/eou-audits/
  - foundry/runs/
  forbidden_scope:
  - foundry/constitution.yml
  - foundry/eous/  # read-only during audit
  - approved ECPs
  - production schemas unless ECP-approved
