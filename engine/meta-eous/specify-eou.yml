id: specify-eou
name: Specify EOU
version: 0.3.0
classification:
  function: specify
  target_object: foundry governance object
  automation_mode: LLM_assisted
  authority_level: write_candidate
  risk_level: medium
  lifecycle_stage: draft
purpose:
  statement: Turn an approved candidate into a complete, schema-conformant EOU spec at lifecycle_stage:draft.
  non_goals:
  - Do not bypass ECP or human approval.
  - Do not set lifecycle_stage to active, pilot, or approved.
  - Do not reuse a generation_envelope from another EOU — scope it to this EOU's actual outputs.
operating_hypothesis: Given an approved candidate and the Foundry schema, this EOU can produce a complete EOU spec with all fields populated and no placeholder strings.
inputs:
  required:
  - approved_candidate  # path to the approved candidate file (entry in a candidate-set under foundry/self-evolution/candidate-sets/, or a standalone candidate file)
  - schemas/eou.schema.yml
  - foundry/constitution.yml
  optional:
  - foundry/governance.yml
  - foundry/failure-taxonomy.yml  # to populate failure_modes
  - foundry/registry.yml          # to run registry-diff
  forbidden_assumptions:
  - Do not assume the candidate has all required fields — check and fill gaps.
  - Do not assume the candidate's authority_level is correct — validate against constitution.yml.
context_manifest:
  source_of_truth:
  - schemas/eou.schema.yml
  - constitution.yml
  supporting:
  - failure-taxonomy.yml
  - foundry/governance.yml
  forbidden:
  - foundry/constitution.yml  # read-only; spec must not modify it
execution:
  steps:
  - Determine mode: CREATE (no spec file exists for this candidate) or REPAIR (spec exists but is incomplete or at draft stage).
  - Load the approved_candidate and extract all available fields.
  - Load schemas/eou.schema.yml to identify required fields and allowed values.
  - Map candidate data to the full EOU spec structure — classification, purpose, operating_hypothesis, inputs, context_manifest, execution, outputs, success_criteria, validation, failure_modes, escalation, responsibility, blast_radius, versioning.
  - For each field that the candidate does not provide, derive it from context or mark as TBD with a specific question.
  - Validate all enum fields against schema allowed values (function, automation_mode, authority_level, risk_level, lifecycle_stage).
  - Check blast_radius.allowed_scope is consistent with authority_level — write_candidate may not include active governance files.
  - If the EOU has function:generate, write a generation_envelope scoped to the specific outputs this EOU produces (do not copy from another EOU).
  - Set lifecycle_stage:draft — never active, pilot, or approved.
  - Write spec to output path.
  - Record trace.
  decision_points:
  - In REPAIR mode, do not overwrite fields that are correctly populated — only fill gaps and fix errors.
  - If TBD fields exceed 3, flag the candidate as insufficiently specified and stop — do not write a spec with more than 3 open questions.
  stop_conditions:
  - approved_candidate file not found.
  - schemas/eou.schema.yml not found.
  - Candidate authority_level would exceed what constitution.yml permits at write_candidate stage.
  - More than 3 required fields cannot be derived from candidate data.
  allowed_tools:
  - Read
  - Grep
  - Write
  prohibited_actions:
  - Setting lifecycle_stage to active, pilot, or approved
  - Copying a generation_envelope from another EOU without scoping it
  - Activating or publishing the generated spec
outputs:
  primary:
  - foundry/eous/{eou_id}.yml        # standard EOU
  - foundry/meta-eous/{eou_id}.yml   # if function is generate, audit, validate, or govern
  secondary:
  - open_questions.md  # only if TBD fields are present
  trace:
  - foundry/runs/{eou_id}/{run_id}.yml
success_criteria:
  must_pass:
  - All required schema fields are present and non-placeholder.
  - lifecycle_stage is draft.
  - blast_radius.allowed_scope does not include constitution.yml or active registry entries.
  - No placeholder strings remain (e.g., "target artifact", "What this EOU is meant to do").
  should_pass:
  - generation_envelope is present and scoped for function:generate EOUs.
  - failure_modes.warning_signs and repair_actions are non-empty.
  - open_questions.md is absent (all fields resolved).
validation:
  deterministic:
  - Schema field presence (all required fields populated).
  - lifecycle_stage == draft.
  - No placeholder strings in purpose.statement or execution.steps.
  judgment:
  - Execution steps specificity
  - Blast radius consistency with authority level
  red_team:
  - Candidate with authority_level:approve that this EOU should reject
failure_modes:
  known:
  - Copies a generation_envelope from another EOU verbatim (mismatched scope)
  - Leaves placeholder strings in purpose or steps because candidate was underspecified
  - Sets lifecycle_stage to active or approved in violation of constraints
  - Produces a spec with more than 3 TBD fields and writes it anyway
  warning_signs:
  - Output spec contains the strings "Perform bounded operation" or "target artifact".
  - generation_envelope.max_candidates is 5 or 7 without a specific reason (copied from template).
  - lifecycle_stage is not draft in the written file.
  repair_actions:
  - Scan output for placeholder strings before writing; reject and report if found.
  - Derive max_candidates from the specific generation task, not from the template default.
  - Enforce lifecycle_stage:draft as the only permitted value at write time.
escalation:
  require_human_when:
  - Candidate proposes authority_level:approve or publish.
  - Candidate is a meta-EOU that generates other EOUs.
  - More than 3 required fields cannot be derived from candidate data.
  require_approval_for:
  - Advancing the produced spec beyond draft stage.
responsibility:
  executor: Claude
  reviewer: Foundry maintainer
  approver: human owner
  cannot_delegate:
  - Final approval to advance spec to pilot
  - Weakening the generation_envelope forbidden_outputs list
versioning:
  supersedes: []
  changelog:
  - '0.3.0: Added concrete steps, CREATE/REPAIR mode distinction, approved_candidate as required input, correct output paths, generation_envelope guidance, warning_signs, and repair_actions.'
  - '0.2.0: Converted to faceted EOU Foundry V2 schema.'
blast_radius:
  allowed_scope:
  - foundry/eous/
  - foundry/meta-eous/
  - foundry/runs/
  forbidden_scope:
  - foundry/constitution.yml
  - foundry/registry.yml  # registry updates require a separate ECP
  - approved ECPs
  - production schemas unless ECP-approved
