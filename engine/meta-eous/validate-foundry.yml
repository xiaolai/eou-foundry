id: validate-foundry
name: Validate Foundry
version: 0.3.0
classification:
  function: validate
  target_object: foundry governance object
  automation_mode: hybrid
  authority_level: write_inactive
  risk_level: medium
  lifecycle_stage: draft
purpose:
  statement: Validate the structural integrity of Foundry schemas, registry entries, EOU specs, generating-EOU envelopes, and recursive-governance constraints.
  non_goals:
  - Do not bypass ECP or human approval.
  - Do not repair found violations — produce a validation report only.
  - Do not evaluate operational quality of EOU steps — that is the role of audit-eou.
operating_hypothesis: Given all Foundry schemas and specs, this EOU can detect structural violations (missing fields, schema drift, registry inconsistency, governance constraint failures) that would prevent safe operation.
inputs:
  required:
  - foundry/constitution.yml
  - foundry/registry.yml
  - schemas/eou.schema.yml
  - schemas/ecp.schema.yml
  optional:
  - foundry/eous/          # all EOU specs
  - foundry/meta-eous/     # all meta-EOU specs
  - foundry/governance.yml
  - foundry/failure-taxonomy.yml
  forbidden_assumptions:
  - Do not assume a spec is valid because it exists.
  - Do not assume schema files are current — check their version fields against constitution.yml.
context_manifest:
  source_of_truth:
  - constitution.yml
  - registry.yml
  - schemas/eou.schema.yml
  supporting:
  - failure-taxonomy.yml
  - foundry/governance.yml
  forbidden: []
execution:
  steps:
  - Load all schemas from schemas/*.schema.yml and verify their version fields are consistent with foundry/constitution.yml.
  - Load all EOU specs from foundry/eous/ and foundry/meta-eous/.
  - For each spec, validate against schemas/eou.schema.yml — check required fields, allowed enum values, and structural completeness. Record each violation with the field name and expected value.
  - Cross-check registry.yml — every spec with lifecycle_stage active or pilot must have a registry entry; every registry entry must have a matching spec file. Record orphan specs and unregistered active EOUs.
  - Check recursive governance constraints on all specs — executor must not equal approver; generating EOUs must not have active_eou or approved_eou in generation_envelope.allowed_outputs.
  - Check generation safety on all specs with function:generate — forbidden_outputs must include active_eou, approved_eou, and constitution_change.
  - Optionally validate foundry/constitution.yml hash/version if the file contains a self-integrity field.
  - Write the validation report.
  decision_points:
  - If schemas/*.schema.yml does not exist, stop with "schema file absent" finding — cannot validate specs without schemas.
  - Treat a missing required field as a validation failure, not a warning.
  stop_conditions:
  - schemas/eou.schema.yml not present.
  - foundry/constitution.yml not present.
  - foundry/registry.yml not present.
  allowed_tools:
  - Read
  - Grep
  - Write
  prohibited_actions:
  - Modifying any EOU spec, schema, or registry entry
  - Approving any change
  - Advancing lifecycle_stage on any EOU
outputs:
  primary:
  - foundry/audits/validation/{YYYYMMDD}.validation.yml
  secondary: []
  trace:
  - foundry/runs/{eou_id}/{run_id}.yml
success_criteria:
  must_pass:
  - Every spec in foundry/eous/ and foundry/meta-eous/ is checked against the schema.
  - Registry consistency check is executed.
  - Recursive governance constraint check is executed.
  - Does not modify any spec, schema, registry, or governance file.
  should_pass:
  - Generation safety check executed for all generating EOUs.
  - Schema version consistency checked.
validation:
  deterministic:
  - All required spec fields present (per schema).
  - Registry entries match spec files at active/pilot stages.
  - executor != approver constraint holds for all specs.
  judgment:
  - Schema version freshness assessment
  - Generation envelope scope adequacy
  red_team:
  - Spec with a valid schema but constitutionally prohibited authority configuration
failure_modes:
  known:
  - Validates field presence but not field value correctness
  - Misses orphan specs not yet in registry
  - Does not detect executor==approver when both are role labels rather than names
  warning_signs:
  - Zero validation failures reported for a Foundry with more than 5 specs.
  - Registry consistency check is absent from report.
  - Generating EOU envelopes are not checked.
  repair_actions:
  - Cross-reference registry against filesystem listing, not just against loaded spec list.
  - Treat zero findings as a validation warning — require at least one validation outcome (even a pass statement) per check category.
  - For executor==approver detection, normalize both fields to role categories before comparison.
escalation:
  require_human_when:
  - Schema drift detected between schemas/*.schema.yml and active EOU specs.
  - Registry entry found for an EOU whose spec file is absent.
  - Constitutional invariant violation detected.
  require_approval_for:
  - Any repair to a spec that was found structurally invalid by this validation.
responsibility:
  executor: Claude
  reviewer: Foundry maintainer
  approver: human owner
  cannot_delegate:
  - Approving repairs to specs found invalid by this validation
versioning:
  supersedes: []
  changelog:
  - '0.3.0: Added concrete validation steps, correct required inputs (schemas), decision_points, escalation gates, warning_signs, and repair_actions.'
  - '0.2.0: Converted to faceted EOU Foundry V2 schema.'
blast_radius:
  allowed_scope:
  - foundry/audits/validation/
  - foundry/runs/
  forbidden_scope:
  - foundry/constitution.yml
  - foundry/eous/  # read-only
  - foundry/meta-eous/  # read-only
  - approved ECPs
  - production schemas unless ECP-approved
