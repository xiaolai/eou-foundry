id: propose-ecp
name: Propose ECP
version: 0.3.0
classification:
  function: propose
  target_object: foundry governance object
  automation_mode: LLM_assisted
  authority_level: write_candidate
  risk_level: high
  lifecycle_stage: draft
purpose:
  statement: Create a candidate EOU Change Proposal from a diagnosed failure or selected refactor option.
  non_goals:
  - Do not bypass ECP or human approval.
  - Do not set approval.status to anything other than "proposed".
  - Do not apply the ECP — write the proposal only.
operating_hypothesis: Given a diagnosed failure or refactor option and the ECP schema, this EOU can produce a complete, schema-conformant ECP candidate with all required fields, correct approval status, and a rollback plan for high-risk changes.
inputs:
  required:
  - source_document  # the diagnosed failure (*.diagnosis.yml) or selected refactor option
  - schemas/ecp.schema.yml
  - foundry/constitution.yml
  optional:
  - foundry/failure-taxonomy.yml  # to assign failure class
  - foundry/registry.yml          # to identify affected EOU
  forbidden_assumptions:
  - Do not generate an ECP without a concrete source diagnosis or refactor option.
  - Do not set approval.status to anything other than "proposed".
context_manifest:
  source_of_truth:
  - schemas/ecp.schema.yml
  - constitution.yml
  supporting:
  - failure-taxonomy.yml
  - registry.yml
  forbidden:
  - foundry/constitution.yml  # read-only; constitutional ECPs require a separate process
execution:
  steps:
  - Load source_document and identify the root cause (diagnosis) or chosen option (refactor).
  - Load schemas/ecp.schema.yml and foundry/constitution.yml.
  - Extract the EOU ID and failure class from source_document.
  - Determine the smallest proposed change that addresses the root cause without constitutional violation.
  - If the proposed change touches authority_level, blast_radius.forbidden_scope, or removes a validator, mark risk_level:high or critical.
  - Fill all required ECP fields (see output structure below).
  - Set approval.status:proposed and leave approval.approver blank.
  - For risk_level:high or critical, rollback_considerations must be non-empty.
  - Write the ECP to the proposed/ directory.
  - Record trace.
  decision_points:
  - If source_document motivates a constitutional change, write a separate constitutional ECP with a note that it requires a separate process.
  - If the proposed change is too broad to fit in one ECP, split into multiple narrower proposals.
  stop_conditions:
  - source_document not found.
  - schemas/ecp.schema.yml not found.
  - Proposed change is a constitutional change and no constitutional ECP process is in scope.
  allowed_tools:
  - Read
  - Grep
  - Write
  prohibited_actions:
  - Setting approval.status to approved or any value other than proposed
  - Applying the proposed change to any EOU spec
  - Proposing constitutional changes through ordinary ECP flow
outputs:
  primary:
  - foundry/self-evolution/ecp/proposed/{eou_id}-ecp-{YYYYMMDD}.yml
  secondary: []
  trace:
  - runs/{run_id}/trace.yml
success_criteria:
  must_pass:
  - approval.status is "proposed" in the written ECP.
  - rollback_considerations is non-empty when risk_level is high or critical.
  - tests_required references at least one regression case ID or fixture path.
  - ECP does not modify any existing EOU spec or governance file.
  should_pass:
  - Proposed change addresses the root cause identified in source_document.
  - risk_level correctly reflects the blast radius of the proposed change.
validation:
  deterministic:
  - approval.status == proposed.
  - rollback_considerations non-empty for high/critical risk.
  - tests_required non-empty.
  judgment:
  - Root cause coverage of proposed change
  - Risk level calibration
  red_team:
  - Source document with approval.status already set — EOU must reset it to proposed
failure_modes:
  known:
  - Sets approval.status to approved (violates non-goal)
  - Omits rollback_considerations for high-risk changes
  - References a non-existent regression case ID in tests_required
  - Generates an ECP without a concrete source document (fabricated motivation)
  warning_signs:
  - approval.status is anything other than "proposed" in the output file.
  - tests_required list is empty.
  - rollback_considerations is empty on a change that touches authority_level.
  repair_actions:
  - Override approval.status to "proposed" unconditionally at write time.
  - Reject ECPs with empty tests_required — require at least one regression case ID or fixture reference.
  - Reject ECPs with empty rollback_considerations when risk_level is high or critical.
escalation:
  require_human_when:
  - Proposed change affects authority_level of the target EOU.
  - Proposed change removes or weakens a validator.
  - Source document indicates a constitutional invariant violation.
  require_approval_for:
  - Advancing approval.status from proposed to any higher value.
  - Applying the ECP to any active or pilot EOU.
responsibility:
  executor: Claude
  reviewer: Foundry maintainer
  approver: human owner (named, not a role label)
  cannot_delegate:
  - Advancing approval.status beyond "proposed"
  - Applying ECP changes to active EOUs
versioning:
  supersedes: []
  changelog:
  - '0.3.0: Added concrete steps, source_document as required input, correct output path, approval.status enforcement, decision_points, escalation gates, warning_signs, and repair_actions.'
  - '0.2.0: Converted to faceted EOU Foundry V2 schema.'
blast_radius:
  allowed_scope:
  - foundry/self-evolution/ecp/proposed/
  - runs/
  forbidden_scope:
  - foundry/constitution.yml
  - foundry/eous/  # ECP proposes changes; it does not apply them
  - approved ECPs
  - production schemas unless ECP-approved
generation_envelope:
  allowed_outputs:
  - candidate_ecp
  forbidden_outputs:
  - active_eou
  - approved_eou
  - approved_ecp
  - constitution_change
  - validator_weakening_without_ecp
  max_candidates: 1  # propose one ECP per invocation; split broad changes into multiple calls
  default_status: proposed
  required_for_each_candidate:
  - target_eou          # schema field (not eou_id)
  - target_version_from # schema field
  - target_version_to   # schema field
  - failure_class       # supplementary (not schema-required)
  - problem             # schema field (not observed_problem)
  - proposed_change
  - expected_benefit
  - risks
  - tests_required      # schema field (not required_tests)
  - simulation          # schema field (not simulation_status)
  - rollback_considerations  # supplementary
  - approval.status     # must be "proposed"
generation_budget:
  max_candidates: 1
  max_new_schemas: 0
  max_new_validators: 0
  max_open_questions: 3
  must_rank_candidates: false
  must_select_minimal_set: false
registry_diff:
  required: true
  questions:
  - Is there already an open ECP for this EOU that covers the same change?
minimality_test:
  questions:
  - Can this change be achieved with a smaller blast radius (stop condition, validator, regression case)?
  - Is this the narrowest change that addresses the root cause?
operational_value_test:
  required_answer:
  - prevents_failure
  - improves_decision
  reject_if:
  - no concrete source document
counter_generation:
  required: true
  requires_for_each_candidate:
  - arguments_against
  - minimality_result
