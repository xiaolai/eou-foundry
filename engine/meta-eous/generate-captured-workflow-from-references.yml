id: generate-captured-workflow-from-references
name: Generate Captured Workflow from References
version: 0.1.0
classification:
  function: generate
  target_object: captured_workflow
  automation_mode: LLM_assisted
  authority_level: write_candidate
  risk_level: medium
  lifecycle_stage: candidate
purpose:
  statement: |
    Synthesize a captured_workflow (D2.4 step 1-5 outputs plus the
    constitutional domain_values layer) from a user goal, structured
    reference set, and constraints. For users who cannot articulate a
    workflow unaided, and for any user who needs the per-app
    constitutional layer made explicit.
  non_goals:
  - Do not generate candidate EOUs (that is $generate-eou-candidates' job).
  - Do not teach domain vocabulary (this skill is not a curriculum).
  - Do not curate canonical practitioner lists (the user provides references).
  - Do not assert "X is canonical" without source citation.
  - Do not produce a captured_workflow at any lifecycle_stage other than candidate.
operating_hypothesis: |
  Given a user goal, a 5-role reference set with justifications, explicit
  constraints + negative constraints + user contributions per slot, this
  EOU produces a captured_workflow.yml that passes structural validation
  and whose domain_values block passes both the inclusion test and a
  counterfactual swap audit at acceptable rate.
inputs:
  required:
  - user_goal
  - reference_set                    # mapping with 5 role slots, each non-empty
  - constraints                      # audience, scale, budget, time, risk_tolerance, desired_effect
  - negative_constraints
  - user_contributed_references      # ≥1 per role slot — V2 anti-abdication enforcement
  optional:
  - starter_pack                     # engine/starter-packs/{domain}.yml if present (opt-in)
  - prior_captured_workflow          # for revision/supersession runs
  forbidden_assumptions:
  - Do not assume the user can name the field's vocabulary.
  - Do not assume the user knows the canonical practitioners.
  - Do not assume the field's taxonomy is known to either party.
  - Do not assume pre-existing workflow prose (that input goes to $generate-eou-candidates).
context_manifest:
  source_of_truth:
  - schemas/captured-workflow.schema.yml
  - dev-docs/06-values-over-rules.md
  supporting:
  - dev-docs/08-stage-0-design.md
  - dev-docs/04-vocabulary-principles.md
  - engine/starter-packs/                # opt-in per-domain seed references
  forbidden:
  - any prior captured_workflow from another app
  - foundry/eous/
  - foundry/registry.yml
execution:
  steps:
  - Validate inputs against schemas/captured-workflow.schema.yml; refuse if any role slot is empty or user_contributed_references is empty per slot.
  - For each reference, ensure each entry has a `why` justification; if missing, prompt the user (or, in LLM_assisted mode, propose then require user confirmation).
  - Perform counterfactual deconstruction across references to surface hidden_judgments.
  - Perform negative-space analysis across references and anti-references to surface failure_modes.
  - Perform comparative analysis across the reference set to surface decision_boundaries.
  - Converge on artifact_target via reference convergence plus constraints.
  - Synthesize captured_workflow prose.
  - Detect pattern of repeated trade-off resolution across references to surface candidate domain_values; for each, run the six-test inclusion check; reject candidates that fail every test.
  - Order surviving domain_values by user-confirmed priority (total order, no ties, exactly N integers for N values).
  - For each value, set canonical_or_personal; require justification_if_diverges when non-canonical.
  - Compute per-section confidence (low/medium/high).
  - Bundle output as foundry/captured-workflows/cw-{slug}.yml; require user approval at all four gates separately.
  - Record run trace at foundry/runs/generate-captured-workflow-from-references/{run_id}.yml per ECP-0014.
  decision_points:
  - Whether a candidate domain_value passes the inclusion test (per-test booleans must be recorded; ≥1 true required).
  - Whether the X-over-Y formulation has a real opposing value (configurable strawman list check; fail if Y is strawman).
  - Whether user_contributed_references meet the ≥1-per-slot rule.
  - Whether confidence per section is low/medium/high (no other values).
  - Whether the user opts to use a starter_pack (recorded if used).
  stop_conditions:
  - Any role slot empty after best-effort elicitation.
  - user_contributed_references empty for any slot (V2 violation).
  - Fewer than 3 surviving domain_values after inclusion-test filtering.
  - More than 8 surviving domain_values (cap mirrors foundry V1-V8 sizing).
  - Counterfactual swap audit reveals fewer than 3 flips out of 5 tests (the value layer is decoration).
  - User can articulate a workflow unaided (skill is the wrong tool; recommend $generate-eou-candidates directly).
  - The app is governance scaffolding only with no real craft domain.
  allowed_tools:
  - Read (schemas/, dev-docs/, engine/starter-packs/, engine/constitution-defaults.yml)
  - Write (foundry/captured-workflows/ only)
  prohibited_actions:
  - Writing to foundry/eous/, foundry/meta-eous/, foundry/registry.yml, foundry/self-evolution/ecp/, foundry/self-evolution/regression/.
  - Producing eou_candidate or candidate_set artifacts (separation per D5.1 — that is $generate-eou-candidates' job).
  - Inventing canonical practitioner claims not provided by user.
  - Producing captured_workflow at lifecycle_stage other than candidate.
  - Producing a domain_value that contradicts a foundry V1-V8 invariant.
outputs:
  primary:
  - foundry/captured-workflows/cw-{slug}.yml
  secondary:
  - reference-elicitation-trace.md       # what the user added vs. what the AI proposed
  - inclusion-test-trace.md              # per-value inclusion-test results
  trace:
  - foundry/runs/generate-captured-workflow-from-references/{run_id}.yml
success_criteria:
  must_pass:
  - Output passes schemas/captured-workflow.schema.yml validation.
  - All 5 reference_set role slots non-empty.
  - user_contributed_references ≥1 per slot (V2 enforcement).
  - domain_values count in [3, 8].
  - Priority is a total order with no duplicates or gaps.
  - Every domain_value has ≥1 inclusion_test_passes true.
  - Every X-over-Y formulation has Y not in configurable strawman list.
  - human_approval populated at all 4 gates plus approved_at.
  - Output trace exists at foundry/runs/generate-captured-workflow-from-references/.
  should_pass:
  - Counterfactual swap audit produces ≥3 flips on a 5-test panel (the skill cannot verify directly; downstream consumption surfaces this).
validation:
  deterministic:
  - structural schema check via scripts/validate_foundry.py validate_captured_workflows()
  - role-slot non-emptiness check
  - user-contribution per-slot check
  - domain_values count check
  - priority totality check
  - contested-form check (X-over-Y formulation) against strawman list
  - inclusion_test boolean check
  judgment:
  - Whether the captured workflow prose faithfully reflects the reference set (LLM or human review).
  - Whether hidden_judgments surfaced are non-trivial.
  - Whether the value layer is load-bearing or decorative (reviewer judgment until counterfactual-swap audit lands with agentic-judgment ECPs).
  red_team:
  - What happens if a user submits 5 references but no anti_reference? (must halt)
  - What happens if all 5 references are the same work in different editions? (should detect; halt with diversity error)
  - What happens if user submits a reference set in a domain the skill has never seen? (must succeed — skill is mechanism-only)
  - What happens if user requests captured_workflow at lifecycle_stage active? (must refuse)
  - What happens if user requests producing eou_candidate as a side output? (must refuse)
failure_modes:
  known:
  - F1_INPUT_FAILURE — missing role slot or empty user contribution.
  - F4_SCOPE_FAILURE — skill produces eou_candidate instead of captured_workflow.
  - F12_DRIFT_FAILURE — skill's understanding of the schema diverges from schemas/captured-workflow.schema.yml.
  - F17_VALUE_HALLUCINATION_FAILURE (proposed in 07-agentic-judgment-proposal.md) — skill invents domain_values not justified by references.
  warning_signs:
  - confidence_per_section all "high" (likely overconfident given unfalsifiable inputs).
  - Formulaic domain_values that all read "quality over Y" where Y varies (not contested-form).
  - User added zero references (all role slots populated by AI alone).
  repair_actions:
  - Reject and return to user with specific findings; do not silently degrade.
  - For F17, demote the suspect domain_value to a candidate marked provisional and require human re-confirmation.
escalation:
  require_human_when:
  - Any domain_value is marked user_diverges_from_canonical.
  - inclusion_test_passes has all six false on any candidate value.
  - Contested-form pattern match flags the opposing value as a strawman.
  - More than 2 stop_conditions hit in a single run.
  - User chooses to override the operational_value_test reject criteria.
  require_approval_for:
  - The four approval gates (reference_set, constraints, domain_values, bundle).
responsibility:
  executor: LLM with skill prompt
  reviewer: user (the human running the skill)
  approver: user
  cannot_delegate:
  - Approval of any of the four gates.
  - Justification of user_diverges_from_canonical.
  - Decision to add a reference the AI did not propose (V2 enforcement).
versioning:
  supersedes: []
  changelog:
  - "0.1.0 — initial introduction (ECP-0016, v0.7.0)."
blast_radius:
  allowed_scope:
  - foundry/captured-workflows/
  - foundry/runs/generate-captured-workflow-from-references/
  forbidden_scope:
  - foundry/eous/
  - foundry/meta-eous/
  - foundry/registry.yml
  - foundry/self-evolution/
  - schemas/
  - engine/
# Rule-95 generating-EOU additional requirements
generation_envelope:
  allowed_outputs:
  - captured_workflow
  forbidden_outputs:
  - active_eou
  - approved_eou
  - eou_candidate                       # deliberate — $generate-eou-candidates' job
  - candidate_set                       # same separation
  - schema_change
  - constitution_change
  - validator_weakening
  - domain_authority_claim              # never assert "X is canonical" without citation
  default_status: candidate
  max_candidates: 1                     # single bundled output per run
  required_for_each_candidate:
  - arguments_against
  - minimality_result
  - distinct_success_criterion
  - operational_value
generation_budget:
  max_candidates: 1
  max_references_processed: 25         # 5 slots × ≤5 refs per slot
  max_open_questions: 10
  must_rank_candidates: false           # single-output specialization; no ranking
  must_select_minimal_set: false        # single-output specialization
registry_diff:
  required: true
  questions:
  - Does the foundry already have a captured_workflow for this app? (If yes, propose superseding via new version, not parallel.)
  - Does the proposed domain_values block duplicate an existing captured_workflow's values? (If yes, suggest reuse rather than re-extraction.)
minimality_test:
  required: true
  questions:
  - Could the user's literacy be sufficient that $generate-eou-candidates with workflow prose would work?
  - Could a context-manifest extension on $generate-eou-candidates suffice for this app's case?
  - Does this app actually have a value layer worth capturing, or is the goal so simple that domain_values is over-engineering?
operational_value_test:
  required: true
  reject_if:
  - user_contributed_references is empty for any role slot
  - reference_set has fewer than 3 filled role slots overall
  - constraints lack negative_constraints (the user has no rejections to record)
  - user can articulate a workflow unaided (skill is the wrong tool; use $generate-eou-candidates directly)
  - the app is governance scaffolding only (no real craft domain)
counter_generation:
  required: true
  requires_for_each_candidate:
  - arguments_against
  - minimality_result
  - distinct_success_criterion
  - operational_value
  example_arguments_against:
  - "over-formalization risk — this captured_workflow may over-formalize the user's intent because the references are not diverse enough to warrant a domain_values layer with ≥3 contested values"
  - "decorative-value risk — two of the surfaced domain_values may fail counterfactual swap on at least one tested decision boundary, so the value layer is partially decorative"
  - "provisional-status note — the user has produced sufficient taste data for hidden_judgments, but the value layer should remain provisional until at least one downstream candidate set is generated and audited against it"
